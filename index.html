<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>

body {
  font-family: 'Playfair Display', serif;
  height: 100vh;
  overflow: hidden;
  background: linear-gradient(135deg, #0b0613 0%, #1a0820 50%, #0b0613 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  color: #fff;
}

/* container */
.container {
  text-align: center;
  max-width: 800px;
  padding: 2rem;
  opacity: 0;
  animation: fadeIn 2.5s ease forwards;
}

/* heart icon */
.heart-icon {
  font-size: 3rem;
  color: #ff4d88;
  margin-bottom: 20px;
  animation: pulse 2.5s infinite;
}

/* message */
.message {
  font-family: 'Dancing Script', cursive;
  font-size: 2.3rem;
  line-height: 1.5;
  margin-bottom: 2.5rem;
  color: #ffd6e7;
}

/* button */
.enter-btn {
  background: transparent;
  color: #ff7aa2;
  border: 1.5px solid #ff7aa2;
  padding: 12px 30px;
  font-size: 1.1rem;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s;
}

.enter-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 15px rgba(255, 122, 162, 0.5);
}

/* animations */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

@keyframes pulse {
  0%,100% {transform: scale(1);}
  50% {transform: scale(1.1);}
}

/* floating hearts */
.heart {
  position: absolute;
  color: rgba(255, 100, 150, 0.4);
  animation: float 10s infinite ease-in-out;
}

@keyframes float {
  0% {transform: translateY(0);}
  50% {transform: translateY(-20px);}
  100% {transform: translateY(0);}
}

</style>
</head>

<body>

<div class="container">

  <div class="heart-icon">❤️</div>

  <div class="message">
    Meri pyari Dumbo…<br><br>
    Aaj ka din sirf tumhara hai ❤️<br>
    Aur shayad… thoda sa mera bhi,<br>
    kyunki tum ho.<br><br>
    Step inside… Atulya,<br>
    aaj poora din tumhe feel karwane ke liye hai.
  </div>

  <button class="enter-btn" onclick="enter()">Enter Your Day ✨</button>

</div>

<script>

function enter(){
  document.querySelector('.container').style.opacity = "0";
  setTimeout(()=>{
    window.location.href = "index.html"; // 👈 your main unlock page
  },800);
}

</script>

</body>
</html>
